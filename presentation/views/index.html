<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Builder Game</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center" >
        <div class="text-center mb-4">
            <h1 id="game-title">City Builder Game
            </h1>
        </div>
        <div id="buttons" class="d-grid gap-3 col-11 col-sm-8 col-md-6 col-lg-4 mx-auto">
            <button type="button" class="btn btn-primary btn-lg shadow-sm">Cargar partida</button>
            <button type="button" class="btn btn-light btn-lg shadow-sm">Crear nueva partida</button>
            <button type="button" class="btn btn-danger btn-lg shadow-sm">Borrar partida</button>
        </div>
    </div>
</body>
</html>
