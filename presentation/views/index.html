<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Builder Game</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../../js/ui/EventHandler.js"></script>
    <script src="../../js/ui/GridRenderer.js"></script>
    <script src="../../js/utils/localStorage.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/App.js"></script>

</head>

<body>
    <!-- ==================== PANTALLA DE INICIO  ====================-->
    <div id="initial-page" class="screen active">
        <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center">
            <div class="text-center mb-4">
                <h1 id="screen-title">City Builder Game
                </h1>
            </div>
            <div id="buttons" class="d-grid gap-3 col-11 col-sm-8 col-md-6 col-lg-4 mx-auto">
                <button id="btn-load-game" type="button" class="btn btn-primary btn-lg shadow-sm">Cargar
                    partida</button>
                <button id="btn-new-city" type="button" class="btn btn-light btn-lg shadow-sm">Crear nueva
                    partida</button>
                <button type="button" class="btn btn-danger btn-lg shadow-sm">Borrar partida</button>
            </div>
        </div>
    </div>

    <!-- ==================== PANTALLA CARGAR CIUDAD ==================== -->
    <div id="load-game-page" class="screen load-game city-creation">
        <button class="btn btn-black btn-back" id="return">← Volver</button>
        <div class="create-container">
            <div class="create-header">
                <h1 class="screen-title d-flex flex-column justify-content-center text-center">
                    Cargar partida
                </h1>
            </div>
        </div>
    </div>

    <!-- ==================== PANTALLA CREACIÓN DE CIUDAD ==================== -->
    <div id="city-info-page" class="screen city-creation">
        <button class="btn btn-black btn-back" id="btn-back-page">← Volver</button>
        <div class="create-container">
            <div class="create-header">
                <h1 id="title" class="d-flex flex-column justify-content-center align-items-center">
                    Fundar Nueva Ciudad</h1>
            </div>

            <!-- Identidad -->
            <div class="form-section">
                <h2 class="screen-title">Identidad</h2>
                <div class="row g-3">
                    <div class="col-l-12 col-sm-6">
                        <label
                            class="screen-subtitle d-flex flex-column justify-content-center align-items-center">Nombre
                            de la Ciudad</label>
                        <input type="text" id="input-city-name" class="form-control form-input" maxlength="1000"
                            placeholder="Ej: Manizales" />
                    </div>
                    <div class="col-12 col-sm-6">
                        <label
                            class="screen-subtitle d-flex flex-column justify-content-center align-items-center">Nombre
                            del Alcalde</label>
                        <input type="text" id="input-mayor-name" class="form-control form-input" maxlength="50"
                            placeholder="Ingresa un nombre" />
                    </div>
                </div>
            </div>

            <!-- Región -->
            <div class="form-section">
                <h2 class="screen-title">Región Geográfica
                </h2>
                <div class="row g-3">
                    <div class="col-12">
                        <label
                            class="screen-subtitle form-label d-flex flex-column justify-content-center align-items-center">Ciudad
                            de Colombia</label>
                        <select id="input-region" class="form-select form-input">
                            <option value="">— Selecciona una opción —</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Configuracion del juego -->

            <div class="form-section">
                <h2 class="screen-title">Configuración del
                    juego
                </h2>
                <div class="row g-3">
                    <div class="col-12 col-sm-4">

                        <label
                            class="screen-subtitle d-flex flex-column justify-content-center align-items-center">Tamaño
                            del Mapa</label>
                        <div class="range-container">
                            <input type="range" id="input-map-size" class="screen-title form-range" min="15" max="30"
                                value="20" step="1" />
                            <span id="map-size-display" class="screen-title range-display">20×20</span>
                        </div>
                    </div>
                    <div class="col-12 col-sm-4">
                        <label
                            class="screen-subtitle form-label d-flex flex-column justify-content-center align-items-center">Duración
                            del Turno (seg)</label>
                        <input type="number" id="input-turn-duration" class="form-control form-input" min="5" max="120"
                            value="15" />
                    </div>
                    <div class="col-12 col-sm-4">
                        <label
                            class="screen-subtitle form-label d-flex flex-column justify-content-center align-items-center">Tasa
                            de Crecimiento (ciudadanos/turno)</label>
                        <input type="number" id="input-growth-rate" class="form-control form-input" min="1" max="10"
                            value="2" />
                    </div>

                    <div class="row g-3">
                        <div class="col-12 col-sm-4">
                            <label
                                class=" screen-subtitle form-label d-flex flex-column justify-content-center align-items-center">Electricidad
                                inicial</label>
                            <input type="number" id="input-init-electricity" class="form-control form-input" min="0"
                                value="0" />
                        </div>
                        <div class="col-12 col-sm-4">
                            <label
                                class="screen-subtitle form-label d-flex flex-column justify-content-center align-items-center">Agua
                                inicial</label>
                            <input type="number" id="input-init-water" class="form-control form-input" min="0"
                                value="0" />
                        </div>
                        <div class="col-12 col-sm-4">
                            <label
                                class="screen-subtitle form-label d-flex flex-column justify-content-center align-items-center">Alimentos
                                iniciales</label>
                            <input type="number" id="input-init-food" class="form-control form-input" min="0"
                                value="0" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- Acción -->
            <div class="d-grid mt-3" id="button-div">
                <button class="btn-primary btn-xl btn-full" id="btn-create-game">
                    🏗️ Fundar Ciudad
                </button>
            </div>
        </div>
    </div>

    <!--  ==================== PANTALLA DE JUEGO  ====================-->
    <div id="game-page" class=" screen container-fluid city-creation">
        <header id="header" class="bg-dark text-white p-3">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <div class="d-flex flex-column">
                    <h3 id="screen-title">City Builder Game</h3>
                    <button type="button" class="btn btn-dark" id="return-start-page">Menú principal</button>
                </div>

                <div id="resource-panel" class="d-flex gap-3">
                    <span id="money">$50,000</span>
                    <span id="electricity">⚡ 0</span>
                    <span id="water">💧 0</span>
                    <span id="food">🌾 0</span>
                    <span id="population">👥 0</span>
                    <span id="happiness">😊 0%</span>
                </div>
            </div>
        </header>
        <div class="row">
            <aside class="col-lg-2 bg-light sidebar p-3">
                <h5>Construcción</h5>

                <div class="list-group">
                    <button class="list-group-item list-group-item-action">Casa</button>
                    <button class="list-group-item list-group-item-action">Apartamento</button>
                    <button class="list-group-item list-group-item-action">Tienda</button>
                    <button class="list-group-item list-group-item-action">Centro Comercial</button>
                    <button class="list-group-item list-group-item-action">Fábrica</button>
                    <button class="list-group-item list-group-item-action">Granja</button>
                    <button class="list-group-item list-group-item-action">Policía</button>
                    <button class="list-group-item list-group-item-action">Bomberos</button>
                    <button class="list-group-item list-group-item-action">Hospital</button>
                    <button class="list-group-item list-group-item-action">Planta Eléctrica</button>
                    <button class="list-group-item list-group-item-action">Planta de Agua</button>
                    <button class="list-group-item list-group-item-action">Parque</button>
                    <button class="list-group-item list-group-item-action">Vía</button>
                    <button class="list-group-item list-group-item-action text-danger">Demoler</button>

                    <hr>

                    <button class="btn btn-primary w-100 mb-2">Calcular Ruta</button>
                    <button class="btn btn-success w-100 mb-2">Guardar</button>
                    <button class="btn btn-warning w-100">Exportar</button>

            </aside>

            <!-- Mapa Central -->
            <div class="col-lg-7 p-3" id="grid">

            </div>

            <!-- Sidebar Derecho -->
            <aside class="col-lg-3 bg-light p-3">

                <h5>Clima</h5>
                <div id="weather-widget" class="mb-4">
                    <p>Temperatura: -- °C</p>
                    <p>Condición: --</p>
                </div>

                <h5>Noticias</h5>
                <div id="news-panel">
                    <div class="card mb-2">
                        <div class="card-body">
                            <h6>Título noticia</h6>
                            <p>Descripción breve...</p>
                        </div>
                    </div>
                </div>

                <hr>

                <h5>Puntuación</h5>
                <div id="score-panel">
                    <h4>0</h4>
                </div>

            </aside>

        </div>
    </div>
</body>

</html>
