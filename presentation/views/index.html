<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Builder Game</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center" >
        <div class="text-center mb-4">
            <h1 id="game-title"><span>C</span><span>I</span><span>T</span><span>Y</span><span>&nbsp;</span>
                <span>B</span><span>U</span><span>I</span><span>L</span><span>D</span><span>E</span><span>R</span>
            </h1>
        </div>
        <div id="buttons" class="d-grid gap-3 col-10 col-sm-6 col-md-4 col-lg-3">
            <button class="btn btn-primary btn-lg">Cargar partida</button>
            <button type="button" class="btn btn-light btn-lg">Crear nueva partida</button>
            <button type="button" class="btn btn-danger btn-lg">Borrar partida</button>
        </div>
    </div>
</body>
</html>
